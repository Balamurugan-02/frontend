<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f8f9fa;
        }

        header {
            background: #ff5722;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            color: #555;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .search-box input {
            padding: 12px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .search-box button {
            padding: 12px 20px;
            border: none;
            background: #ff5722;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .restaurants {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin-bottom: 8px;
        }

        .card p {
            color: #666;
            margin-bottom: 10px;
        }

        .rating {
            color: #ff9800;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h2>🍔 FoodExpress</h2>
</header>

<section class="hero">
    <h1>Order Food Online</h1>
    <p>Fresh meals delivered to your doorstep.</p>

    <div class="search-box">
        <input type="text" placeholder="Enter your location">
        <button onclick="searchFood()">Find Food</button>
    </div>
</section>

<section class="restaurants">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=800" alt="Pizza">
        <div class="card-content">
            <h3>Pizza Palace</h3>
            <p>Italian • Pizza • Fast Delivery</p>
            <span class="rating">⭐ 4.7</span>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" alt="Burger">
        <div class="card-content">
            <h3>Burger Hub</h3>
            <p>Burgers • Fries • Drinks</p>
            <span class="rating">⭐ 4.5</span>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=800" alt="Biryani">
        <div class="card-content">
            <h3>Biryani House</h3>
            <p>Indian • Biryani • Curry</p>
            <span class="rating">⭐ 4.8</span>
        </div>
    </div>
</section>

<footer>
    © 2026 FoodExpress. Demo page for S3 static website hosting.
</footer>

<script>
    function searchFood() {
        alert("S3 Static Website Hosting is working! 🎉");
    }
</script>

</body>
</html>
